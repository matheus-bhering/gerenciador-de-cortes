<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>CONTROLE DE CORTE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --bg:#0f1115;
    --surface:#171a21;
    --surface-2:#1f2330;
    --border:#2a2f3d;
    --text:#f4f5f7;
    --muted:#9aa3b2;
    --primary:#6c8cff;
    --primary-2:#5a78e6;
    --success:#26c281;
    --warning:#f0a23a;
    --danger:#ef4f5b;
    --whatsapp:#25d366;
    --radius:14px;
    --shadow:0 6px 22px rgba(0,0,0,.35);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:15px;line-height:1.45}
  a{color:var(--primary);text-decoration:none}
  button,input,select,textarea{font-family:inherit;font-size:15px;color:var(--text)}
  input,select,textarea{
    width:100%;background:var(--surface-2);border:1px solid var(--border);
    border-radius:10px;padding:12px 14px;outline:none;
  }
  input:focus,select:focus,textarea:focus{border-color:var(--primary)}
  label{display:block;font-size:13px;color:var(--muted);margin:10px 0 6px}
  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    background:var(--primary);color:#fff;border:none;border-radius:12px;
    padding:13px 16px;font-weight:600;cursor:pointer;width:100%;
    transition:transform .05s ease, background .15s ease;
  }
  .btn:active{transform:scale(.98)}
  .btn:hover{background:var(--primary-2)}
  .btn.secondary{background:var(--surface-2);color:var(--text);border:1px solid var(--border)}
  .btn.success{background:var(--success)}
  .btn.warn{background:var(--warning);color:#1a1300}
  .btn.danger{background:var(--danger)}
  .btn.whatsapp{background:var(--whatsapp)}
  .btn.ghost{background:transparent;border:1px solid var(--border);color:var(--text)}
  .btn.sm{padding:9px 12px;font-size:13px;border-radius:10px;font-weight:500}
  .row{display:flex;gap:8px;flex-wrap:wrap}
  .row > *{flex:1}
  /* ===== Login ===== */
  #login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
  .login-card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px;width:100%;max-width:380px;box-shadow:var(--shadow);text-align:center}
  .logo{
    width:72px;height:72px;border-radius:50%;
    background:linear-gradient(135deg,var(--primary),#9d6cff);
    display:flex;align-items:center;justify-content:center;font-size:32px;margin:0 auto 14px;
  }
  .login-card h1{margin:0 0 6px;font-size:20px;letter-spacing:.5px}
  .login-card p{margin:0 0 22px;color:var(--muted);font-size:13px}
  /* ===== App ===== */
  #app{display:none;padding-bottom:90px}
  header{
    position:sticky;top:0;z-index:10;background:rgba(15,17,21,.92);
    backdrop-filter:blur(8px);border-bottom:1px solid var(--border);
    padding:12px 14px;display:flex;align-items:center;gap:10px;
  }
  header .title{font-weight:700;font-size:15px;letter-spacing:.5px;flex:1}
  header .icon-btn{
    background:var(--surface-2);border:1px solid var(--border);color:var(--text);
    width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;
  }
  main{padding:14px}
  .section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:14px;box-shadow:var(--shadow)}
  .section h2{margin:0 0 12px;font-size:13px;color:#e8ebf2;text-transform:uppercase;letter-spacing:1.4px;font-weight:700;display:flex;align-items:center;gap:8px}
  .section h2::before{content:"";display:inline-block;width:4px;height:14px;background:linear-gradient(180deg,var(--primary),#9d6cff);border-radius:2px}
  /* Filtros */
  .filter-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}
  .filter-grid label{margin:0 0 4px}
  .filter-grid select{padding:10px 12px;font-weight:600}
  /* Comprovante viewer */
  .receipt-thumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:8px}
  .receipt-thumb{
    position:relative;aspect-ratio:1/1;background:var(--surface-2);border:1px solid var(--border);
    border-radius:12px;overflow:hidden;cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:transform .15s ease, border-color .15s ease;
  }
  .receipt-thumb:hover{transform:scale(1.03);border-color:var(--primary)}
  .receipt-thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .receipt-thumb .ph{font-size:28px;color:var(--muted)}
  .receipt-thumb .num{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.65);color:#fff;font-size:11px;padding:2px 7px;border-radius:999px;font-weight:600}
  /* Lightbox */
  #lightbox{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:400;padding:14px;flex-direction:column}
  #lightbox.show{display:flex}
  #lightbox img{max-width:100%;max-height:82vh;border-radius:12px;box-shadow:0 10px 40px rgba(0,0,0,.6)}
  #lightbox .lb-bar{display:flex;gap:10px;margin-top:14px}
  #lightbox .lb-bar button,#lightbox .lb-bar a{
    background:var(--surface);border:1px solid var(--border);color:#fff;padding:10px 16px;
    border-radius:10px;font-weight:600;cursor:pointer;text-decoration:none;font-size:14px;
  }
  #lightbox .lb-close{position:absolute;top:14px;right:14px;background:rgba(255,255,255,.1);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:22px;cursor:pointer}
  /* Dashboard cards */
  .stats{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
  .stat{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px}
  .stat .label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .stat .value{font-size:22px;font-weight:700;margin-top:4px}
  .stat.full{grid-column:1/-1}
  .stat.success .value{color:var(--success)}
  .stat.warn .value{color:var(--warning)}
  .stat.primary .value{color:var(--primary)}
  /* Tabs */
  .tabs{display:flex;gap:6px;background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:4px;margin-bottom:12px}
  .tabs button{flex:1;background:transparent;border:none;color:var(--muted);padding:9px;border-radius:8px;font-weight:600;font-size:13px;cursor:pointer}
  .tabs button.active{background:var(--primary);color:#fff}
  /* Card de corte */
  .corte{background:var(--surface-2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:10px}
  .corte-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:8px}
  .corte .tipo{font-weight:600;font-size:14px}
  .corte .data{font-size:12px;color:var(--muted);margin-top:2px}
  .corte .preco{font-weight:700;font-size:16px;white-space:nowrap}
  .badge{display:inline-block;padding:3px 8px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase}
  .badge.pago{background:rgba(38,194,129,.15);color:var(--success)}
  .badge.pendente{background:rgba(240,162,58,.15);color:var(--warning)}
  .corte .obs{font-size:13px;color:var(--muted);margin-top:6px;white-space:pre-wrap;word-break:break-word}
  .corte .actions{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:10px}
  .corte .actions .full{grid-column:1/-1}
  .nf{font-size:12px;color:var(--muted);margin-top:6px;word-break:break-all}
  .nf a{display:inline-block;margin-right:8px}
  /* Modal */
  .modal-bg{
    position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;
    align-items:flex-end;justify-content:center;z-index:100;padding:0;
  }
  .modal-bg.show{display:flex}
  .modal{
    background:var(--surface);width:100%;max-width:520px;
    border-radius:18px 18px 0 0;padding:18px;max-height:92vh;overflow-y:auto;
    border:1px solid var(--border);border-bottom:none;
  }
  .modal h3{margin:0 0 12px;font-size:17px}
  .modal .close{float:right;background:transparent;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1}
  /* Toast */
  #toast{position:fixed;left:50%;bottom:80px;transform:translateX(-50%);background:#222838;color:#fff;border:1px solid var(--border);padding:10px 16px;border-radius:10px;box-shadow:var(--shadow);opacity:0;pointer-events:none;transition:opacity .25s, bottom .25s;z-index:200;font-size:14px;max-width:90vw;text-align:center}
  #toast.show{opacity:1;bottom:100px}
  #toast.error{border-color:var(--danger);color:#ffd7da}
  #toast.success{border-color:var(--success);color:#caf3df}
  /* Loader */
  .spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  #fullLoader{position:fixed;inset:0;background:rgba(15,17,21,.7);display:none;align-items:center;justify-content:center;z-index:300;backdrop-filter:blur(3px)}
  #fullLoader.show{display:flex}
  #fullLoader .spinner{width:42px;height:42px;border-width:3px;border-top-color:var(--primary)}
  /* Mês picker */
  .month-row{display:flex;gap:8px;align-items:center}
  .month-row select{flex:1}
  /* Footer */
  footer{text-align:center;padding:18px 14px;color:var(--muted);font-size:12px}
  /* Empty state */
  .empty{text-align:center;color:var(--muted);padding:18px;font-size:14px}
  /* Hide scrollbar mobile */
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
  /* Quick actions grid */
  .quick{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  .quick .full{grid-column:1/-1}
</style>
</head>
<body>

<!-- ============== LOGIN ============== -->
<div id="login">
  <div class="login-card">
    <div class="logo">✂️</div>
    <h1>CONTROLE DE CORTE</h1>
    <p>Acesso restrito</p>
    <input id="loginPass" type="password" placeholder="Senha" autocomplete="off" />
    <div style="height:12px"></div>
    <button class="btn" onclick="doLogin()">Entrar</button>
    <div id="loginError" style="color:var(--danger);font-size:13px;margin-top:10px;min-height:18px"></div>
    <div style="margin-top:22px;padding-top:16px;border-top:1px solid var(--border);font-size:12px;color:var(--muted)">
      Criado por <strong style="color:#e8ebf2">Matheus Bhering</strong>
    </div>
  </div>
</div>

<!-- ============== APP ============== -->
<div id="app">
  <header>
    <div class="title">✂️ CONTROLE DE CORTE</div>
    <button class="icon-btn" onclick="loadData(true)" title="Atualizar" aria-label="Atualizar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
    </button>
    <button class="icon-btn" onclick="logout()" title="Sair" aria-label="Sair">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
    </button>
  </header>

  <main>

    <!-- Filtro -->
    <div class="section">
      <h2>Filtrar período</h2>
      <div class="filter-grid">
        <div>
          <label>Ano</label>
          <select id="filterYear" onchange="onYearChange()"></select>
        </div>
        <div>
          <label>Mês</label>
          <select id="filterMonth" onchange="render()"></select>
        </div>
        <div>
          <label>Dia</label>
          <select id="filterDay" onchange="render()"></select>
        </div>
      </div>
    </div>

    <!-- Dashboard -->
    <div class="section">
      <h2>Dashboard</h2>
      <div class="stats">
        <div class="stat primary"><div class="label">Cortes no mês</div><div class="value" id="dashCortes">0</div></div>
        <div class="stat"><div class="label">Total gasto</div><div class="value" id="dashTotal">R$ 0,00</div></div>
        <div class="stat success"><div class="label">Pagos</div><div class="value" id="dashPagos">0</div></div>
        <div class="stat warn"><div class="label">Pendentes</div><div class="value" id="dashPendentes">0</div></div>
        <div class="stat full success"><div class="label">Já pago</div><div class="value" id="dashJaPago">R$ 0,00</div></div>
      </div>
    </div>

    <!-- Ações rápidas -->
    <div class="section">
      <h2>Ações</h2>
      <div class="quick">
        <button class="btn" onclick="openLancar()">+ Lançar corte</button>
        <button class="btn secondary" onclick="downloadPDF()">⬇ Baixar mês (PDF)</button>
        <button class="btn whatsapp full" onclick="enviarResumoWhats()">📊 Enviar resumo p/ Hugo</button>
        <button class="btn whatsapp full" onclick="conversarHugo()">💬 Conversar com Hugo</button>
      </div>
    </div>

    <!-- Pendentes -->
    <div class="section">
      <h2>Pendentes de pagamento</h2>
      <div id="listaPendentes"></div>
    </div>

    <!-- Histórico -->
    <div class="section">
      <h2>Histórico de cortes</h2>
      <div class="tabs">
        <button class="active" data-tab="todos" onclick="setTab('todos')">Todos</button>
        <button data-tab="pendentes" onclick="setTab('pendentes')">Pendentes</button>
        <button data-tab="pagos" onclick="setTab('pagos')">Pagos</button>
      </div>
      <div id="listaHistorico"></div>
    </div>

  </main>

  <footer>Criado por: <strong>Matheus Bhering</strong></footer>
</div>

<!-- ============== MODAIS ============== -->
<div class="modal-bg" id="modalBg">
  <div class="modal" id="modalContent"></div>
</div>

<!-- Toast / loader / lightbox -->
<div id="toast"></div>
<div id="fullLoader"><div class="spinner"></div></div>
<div id="lightbox" onclick="if(event.target.id==='lightbox')closeLightbox()">
  <button class="lb-close" onclick="closeLightbox()" aria-label="Fechar">×</button>
  <img id="lbImg" alt="Comprovante" />
  <div class="lb-bar">
    <button onclick="lbPrev()" id="lbPrev">‹ Anterior</button>
    <a id="lbOpen" target="_blank" rel="noopener">Abrir original ↗</a>
    <button onclick="lbNext()" id="lbNext">Próximo ›</button>
  </div>
</div>

<script>
/* ============== CONFIG ============== */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRo-CLB0__unjyN2Wq6t9r9vq5Fknj3vxXbws-ErK0suF3QtMbRlRgK02McDW2gBIwJlRqpPnxA9QV4/pub?output=csv";
const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyM0SBkyNd4EAjl2C_Vv6APbqko-dZKFA_UTARaj1LICgdVrtcPmS5omADftqcwmuI/exec";
const HUGO_PHONE = "5531971325441";
const PASS_LOGIN = "Matheus123";
const PASS_ACOES = "Gatas123";

const TABELA_CORTES = [
  ["Nevou+corte", 130.00],
  ["Luzes+corte", 130.00],
  ["Barba", 15.00],
  ["Sobrancelha", 7.00],
  ["Pezinho", 7.00],
  ["Corte disfarçado", 30.00],
  ["Corte simples+barba", 40.00],
  ["Corte disfarçado+barba", 45.00],
  ["Corte simples+barba+sobrancelha", 47.00],
  ["Corte disfaçado+barba+sobrancelha", 52.00],
  ["Corte+pigmentação", 45.00],
  ["Corte navalhado", 35.00],
  ["Corte+pigmentação+barba+sobrancelha", 67.00],
  ["Corte+pigmentação+sobrancelha", 52.00],
  ["Corte disfarçado+sobrancelha", 37.00],
  ["Corte navalhado+barba", 50.00],
  ["Corte disfarçado+barba+pigmentação", 60.00],
  ["Corte Degrade", 30.00],
  ["Corte degrade+barba", 45.00],
  ["Corte degrade+barba+sobrancelha", 52.00],
];

/* ============== STATE ============== */
let allData = [];
let currentTab = "todos";

/* ============== UTILS ============== */
const $ = s => document.querySelector(s);
const fmtBRL = n => "R$ " + Number(n||0).toFixed(2).replace(".",",");
function showLoader(b){ $("#fullLoader").classList.toggle("show", b); }
function toast(msg, type){
  const t = $("#toast");
  t.textContent = msg;
  t.className = "show " + (type||"");
  setTimeout(()=>{ t.className = ""; }, 2600);
}
function parseDateBR(s){
  if(!s) return null;
  if(s instanceof Date) return s;
  s = String(s).trim();
  // dd/mm/yyyy
  let m = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{2,4})$/);
  if(m){ let y = m[3].length===2 ? "20"+m[3] : m[3]; return new Date(+y, +m[2]-1, +m[1]); }
  // yyyy-mm-dd
  m = s.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if(m) return new Date(+m[1], +m[2]-1, +m[3]);
  const d = new Date(s);
  return isNaN(d.getTime()) ? null : d;
}
function fmtDateBR(d){
  if(!d) return "";
  const dd = String(d.getDate()).padStart(2,"0");
  const mm = String(d.getMonth()+1).padStart(2,"0");
  return dd+"/"+mm+"/"+d.getFullYear();
}
function todayBR(){ return fmtDateBR(new Date()); }
function todayISO(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()+0).padStart(2,"0"); }
function isoToBR(iso){ if(!iso) return ""; const [y,m,d]=iso.split("-"); return `${d}/${m}/${y}`; }
function parsePreco(v){
  if(typeof v === "number") return v;
  if(!v) return 0;
  return parseFloat(String(v).replace(/[^\d,.-]/g,"").replace(",", ".")) || 0;
}

/* CSV parser (handles quotes) */
function parseCSV(text){
  const rows = []; let cur = []; let val = ""; let inQ = false;
  for(let i=0;i<text.length;i++){
    const c = text[i];
    if(inQ){
      if(c === '"' && text[i+1] === '"'){ val += '"'; i++; }
      else if(c === '"'){ inQ = false; }
      else val += c;
    } else {
      if(c === '"') inQ = true;
      else if(c === ","){ cur.push(val); val=""; }
      else if(c === "\n"){ cur.push(val); rows.push(cur); cur=[]; val=""; }
      else if(c === "\r"){}
      else val += c;
    }
  }
  if(val.length || cur.length){ cur.push(val); rows.push(cur); }
  return rows;
}

/* ============== LOGIN ============== */
function doLogin(){
  const v = $("#loginPass").value;
  if(v === PASS_LOGIN){
    sessionStorage.setItem("logged","1");
    showApp();
  } else {
    $("#loginError").textContent = "Senha incorreta";
  }
}
$("#loginPass").addEventListener("keydown", e=>{ if(e.key==="Enter") doLogin(); });
function logout(){
  sessionStorage.removeItem("logged");
  $("#app").style.display = "none";
  $("#login").style.display = "flex";
  $("#loginPass").value = "";
  $("#loginError").textContent = "";
}
function showApp(){
  $("#login").style.display = "none";
  $("#app").style.display = "block";
  loadData(true);
}

/* ============== DATA ============== */
async function loadData(silent){
  showLoader(true);
  try{
    const res = await fetch(CSV_URL + "&t=" + Date.now());
    const txt = await res.text();
    const rows = parseCSV(txt).filter(r => r.length && r.some(c=>String(c).trim()!==""));
    if(!rows.length){ allData=[]; render(); return; }
    const headers = rows[0].map(h=>String(h).trim());
    allData = rows.slice(1).map(r=>{
      const o = {};
      headers.forEach((h,i)=> o[h] = r[i] !== undefined ? String(r[i]).trim() : "");
      return {
        id: parseInt(o["Id"]||o["ID"]||o["id"]) || 0,
        data: o["Data"] || "",
        tipo: o["Tipo de Corte"] || o["Tipo"] || "",
        preco: parsePreco(o["Preço"] || o["Preco"]),
        status: (o["Status"]||"Pendente").trim(),
        dataPagamento: o["Data Pagamento"] || "",
        notaFiscal: o["Nota Fiscal"] || "",
        observacoes: o["Observações"] || o["Observacoes"] || "",
      };
    }).filter(r => r.id);
    buildFilters();
    render();
    if(!silent) toast("Dados atualizados", "success");
  } catch(e){
    console.error(e);
    toast("Erro ao carregar dados", "error");
  } finally{
    showLoader(false);
  }
}

/* ============== FILTROS (Ano / Mês / Dia) ============== */
const MESES_PT = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

function buildFilters(){
  const yearSel = $("#filterYear");
  const monthSel = $("#filterMonth");
  const years = new Set();
  allData.forEach(r=>{ const d=parseDateBR(r.data); if(d) years.add(d.getFullYear()); });
  const now = new Date();
  years.add(now.getFullYear());
  const yArr = [...years].sort((a,b)=>b-a);
  const prevY = yearSel.value;
  yearSel.innerHTML = `<option value="all">Todos os anos</option>` +
    yArr.map(y=>`<option value="${y}">${y}</option>`).join("");
  yearSel.value = (prevY && [...yearSel.options].some(o=>o.value===prevY)) ? prevY : String(now.getFullYear());

  const prevM = monthSel.value;
  monthSel.innerHTML = `<option value="all">Todos os meses</option>` +
    MESES_PT.map((nm,i)=>`<option value="${i+1}">${nm}</option>`).join("");
  monthSel.value = prevM || String(now.getMonth()+1);

  rebuildDays();
}

function onYearChange(){ rebuildDays(); render(); }

function rebuildDays(){
  const daySel = $("#filterDay");
  const prev = daySel.value;
  const y = $("#filterYear").value;
  const m = $("#filterMonth").value;
  let max = 31;
  if(y!=="all" && m!=="all") max = new Date(+y, +m, 0).getDate();
  daySel.innerHTML = `<option value="all">Todos os dias</option>` +
    Array.from({length:max},(_,i)=>`<option value="${i+1}">${String(i+1).padStart(2,"0")}</option>`).join("");
  daySel.value = (prev && +prev<=max) ? prev : "all";
}

function getFilter(){
  return {
    year: $("#filterYear").value,
    month: $("#filterMonth").value,
    day: $("#filterDay").value,
  };
}
function matchesFilter(item, f){
  const d = parseDateBR(item.data);
  if(!d) return false;
  if(f.year!=="all" && d.getFullYear()!==+f.year) return false;
  if(f.month!=="all" && (d.getMonth()+1)!==+f.month) return false;
  if(f.day!=="all" && d.getDate()!==+f.day) return false;
  return true;
}
function periodLabel(){
  const f = getFilter();
  const yTxt = f.year==="all" ? "Todos os anos" : f.year;
  const mTxt = f.month==="all" ? "Todos os meses" : MESES_PT[+f.month-1];
  const dTxt = f.day==="all" ? "" : String(f.day).padStart(2,"0");
  return dTxt ? `${dTxt} de ${mTxt} de ${yTxt}` : `${mTxt} de ${yTxt}`;
}

/* ============== RENDER ============== */
function render(){
  const f = getFilter();
  const monthData = allData.filter(r=>matchesFilter(r, f));

  const total = monthData.reduce((a,b)=>a+b.preco,0);
  const pagos = monthData.filter(r=>r.status.toLowerCase()==="pago");
  const pend = monthData.filter(r=>r.status.toLowerCase()!=="pago");
  const jaPago = pagos.reduce((a,b)=>a+b.preco,0);

  $("#dashCortes").textContent = monthData.length;
  $("#dashTotal").textContent = fmtBRL(total);
  $("#dashPagos").textContent = pagos.length;
  $("#dashPendentes").textContent = pend.length;
  $("#dashJaPago").textContent = fmtBRL(jaPago);

  const allPend = allData.filter(r=>r.status.toLowerCase()!=="pago")
    .sort((a,b)=> (parseDateBR(b.data)||0) - (parseDateBR(a.data)||0));
  $("#listaPendentes").innerHTML = allPend.length ? allPend.map(corteCard).join("") : `<div class="empty">Nada pendente 🎉</div>`;

  let hist = monthData.slice();
  if(currentTab==="pendentes") hist = hist.filter(r=>r.status.toLowerCase()!=="pago");
  if(currentTab==="pagos") hist = hist.filter(r=>r.status.toLowerCase()==="pago");
  hist.sort((a,b)=> (parseDateBR(b.data)||0) - (parseDateBR(a.data)||0));
  $("#listaHistorico").innerHTML = hist.length ? hist.map(corteCard).join("") : `<div class="empty">Sem cortes neste filtro</div>`;
}

function setTab(t){
  currentTab = t;
  document.querySelectorAll(".tabs button").forEach(b=> b.classList.toggle("active", b.dataset.tab===t));
  render();
}

function corteCard(r){
  const pago = r.status.toLowerCase()==="pago";
  const links = extractDriveLinks(r.notaFiscal);
  return `
    <div class="corte">
      <div class="corte-head">
        <div>
          <div class="tipo">${escapeHtml(r.tipo||"-")}</div>
          <div class="data">${escapeHtml(r.data||"-")} ${pago && r.dataPagamento ? "· pago em "+escapeHtml(r.dataPagamento) : ""}</div>
          <div style="margin-top:6px"><span class="badge ${pago?"pago":"pendente"}">${pago?"Pago":"Pendente"}</span></div>
        </div>
        <div class="preco">${fmtBRL(r.preco)}</div>
      </div>
      ${r.observacoes ? `<div class="obs">📝 ${escapeHtml(r.observacoes)}</div>` : ""}
      ${links.length ? `
        <div style="margin-top:10px">
          <div style="font-size:12px;color:#cdd3df;font-weight:600;text-transform:uppercase;letter-spacing:.5px">📎 Comprovantes (${links.length})</div>
          <div class="receipt-thumbs">
            ${links.map((l,i)=>{
              const id = driveId(l);
              const thumb = id ? `https://drive.google.com/thumbnail?id=${id}&sz=w400` : "";
              return `<div class="receipt-thumb" onclick='openLightbox(${r.id}, ${i})'>
                ${thumb ? `<img src="${thumb}" alt="Comprovante ${i+1}" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'ph',textContent:'🖼️'}))" />` : `<div class="ph">📄</div>`}
                <div class="num">#${i+1}</div>
              </div>`;
            }).join("")}
          </div>
        </div>` : ""}
      <div class="actions">
        ${!pago ? `<button class="btn success sm full" onclick="askPagar(${r.id})">✓ Confirmar pagamento</button>` : ""}
        <button class="btn secondary sm" onclick="openUpload(${r.id})">📷 Enviar comprovante</button>
        <button class="btn danger sm" onclick="askDelete(${r.id})">🗑 Excluir</button>
      </div>
    </div>
  `;
}
function extractDriveLinks(nf){
  if(!nf) return [];
  return String(nf).split(/\s|\n/).map(s=>s.trim()).filter(s=>/^https?:\/\//i.test(s));
}
function driveId(url){
  const m = String(url).match(/\/d\/([a-zA-Z0-9_-]+)/) || String(url).match(/[?&]id=([a-zA-Z0-9_-]+)/);
  return m ? m[1] : null;
}
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============== LIGHTBOX ============== */
let lbState = { links: [], idx: 0 };
function openLightbox(rowId, idx){
  const r = allData.find(x=>x.id===rowId);
  if(!r) return;
  lbState.links = extractDriveLinks(r.notaFiscal);
  lbState.idx = idx||0;
  showLightbox();
  $("#lightbox").classList.add("show");
}
function showLightbox(){
  const url = lbState.links[lbState.idx];
  const id = driveId(url);
  $("#lbImg").src = id ? `https://drive.google.com/thumbnail?id=${id}&sz=w1600` : url;
  $("#lbOpen").href = url;
  const multi = lbState.links.length > 1;
  $("#lbPrev").style.display = multi ? "" : "none";
  $("#lbNext").style.display = multi ? "" : "none";
}
function closeLightbox(){ $("#lightbox").classList.remove("show"); $("#lbImg").src=""; }
function lbPrev(){ lbState.idx = (lbState.idx - 1 + lbState.links.length) % lbState.links.length; showLightbox(); }
function lbNext(){ lbState.idx = (lbState.idx + 1) % lbState.links.length; showLightbox(); }
function escapeHtml(s){ return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

/* ============== APPS SCRIPT (no-cors via form-encoded) ============== */
async function callApi(action, params){
  // Apps Script aceita GET com params. Usaremos GET para evitar CORS preflight.
  const url = new URL(APPS_SCRIPT_URL);
  url.searchParams.set("action", action);
  Object.entries(params||{}).forEach(([k,v])=> url.searchParams.set(k, v));
  // Para upload (payload grande) usamos POST como form-data simples (sem custom headers => sem preflight)
  if(action === "uploadReceipt"){
    const fd = new FormData();
    fd.append("action", action);
    Object.entries(params||{}).forEach(([k,v])=> fd.append(k, v));
    const res = await fetch(APPS_SCRIPT_URL, { method:"POST", body: fd });
    return await res.json();
  }
  const res = await fetch(url.toString());
  return await res.json();
}

function formLancar(){
  const opts = TABELA_CORTES.map((c,i)=>`<option value="${i}">${c[0]} — ${fmtBRL(c[1])}</option>`).join("");
  openModal(`
    <button class="close" onclick="closeModal()">×</button>

function syncPreco(){
  const i = +$("#lTipo").value;
  $("#lPreco").value = TABELA_CORTES[i][1].toFixed(2);
}
async function submitLancar(){
  const i = +$("#lTipo").value;
  const tipo = TABELA_CORTES[i][0];
  const preco = parseFloat($("#lPreco").value)||TABELA_CORTES[i][1];
  const data = isoToBR($("#lData").value) || todayBR();
  const obs = $("#lObs").value || "";
  const pago = $("#lPago").checked;
  showLoader(true);
  try{
    const r = await callApi("add", {
      data, tipoCorte: tipo, preco: String(preco),
      status: pago ? "Pago" : "Pendente",
      dataPagamento: pago ? data : "",
      observacoes: obs
    });
    if(r.success){
      toast("Corte lançado!", "success");
      closeModal();
      await loadData(true);
    } else toast(r.error||"Erro","error");
  } catch(e){ toast("Erro de conexão","error"); }
  finally{ showLoader(false); }
}

async function doUpload(id){
  const f = $("#upFile").files[0];
  if(!f){ toast("Selecione um arquivo","error"); return; }
  showLoader(true);
  try{
    const b64 = await new Promise((res,rej)=>{
      const r = new FileReader();
      r.onload = ()=> res(r.result);
      r.onerror = rej;
      r.readAsDataURL(f);
    });
    const r = await callApi("uploadReceipt", { id, foto: b64 });
    if(r.success){ toast("Comprovante enviado!","success"); closeModal(); await loadData(true); }
    else toast(r.error||"Erro no upload","error");
  } catch(e){ console.error(e); toast("Erro de conexão","error"); }
  finally{ showLoader(false); }
}

function enviarResumoWhats(){
  const f = getFilter();
  const data = allData.filter(r=>matchesFilter(r,f));
  const periodo = periodLabel();
  const total = data.reduce((a,b)=>a+b.preco,0);
  const pagos = data.filter(r=>r.status.toLowerCase()==="pago");
  const pend = data.filter(r=>r.status.toLowerCase()!=="pago");
  const totalPend = pend.reduce((a,b)=>a+b.preco,0);

  let txt = `*Resumo de Cortes — ${periodo}*\n\n`;
  txt += `✂️ Cortes: ${data.length}\n`;
  txt += `💰 Total: ${fmtBRL(total)}\n`;
  txt += `✅ Pagos: ${pagos.length}\n`;
  txt += `⏳ Pendentes: ${pend.length} (${fmtBRL(totalPend)})\n\n`;

  if(pend.length){
    txt += `*Pendentes:*\n`;
    pend.forEach(r=>{ txt += `• ${r.data} — ${r.tipo} — ${fmtBRL(r.preco)}\n`; });
    txt += `\n`;
  }
  if(data.length){
    txt += `*Detalhamento:*\n`;
    data.sort((a,b)=>(parseDateBR(a.data)||0)-(parseDateBR(b.data)||0)).forEach(r=>{
      txt += `${r.data} — ${r.tipo} — ${fmtBRL(r.preco)} [${r.status}]\n`;
    });
  }

  const url = `https://wa.me/${HUGO_PHONE}?text=${encodeURIComponent(txt)}`;
  window.open(url,"_blank");
}

/* ============== PDF PROFISSIONAL ============== */
function downloadPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({unit:"mm", format:"a4"});
  const PW = doc.internal.pageSize.getWidth();
  const PH = doc.internal.pageSize.getHeight();

  const f = getFilter();
  const periodo = periodLabel();
  const data = allData.filter(r=>matchesFilter(r,f))
    .sort((a,b)=>(parseDateBR(a.data)||0)-(parseDateBR(b.data)||0));
  const total = data.reduce((a,b)=>a+b.preco,0);
  const pagos = data.filter(r=>r.status.toLowerCase()==="pago");
  const pend = data.filter(r=>r.status.toLowerCase()!=="pago");
  const totalPag = pagos.reduce((a,b)=>a+b.preco,0);
  const totalPend = pend.reduce((a,b)=>a+b.preco,0);

  const PRIMARY = [108,140,255];
  const DARK = [30,35,50];
  const GRAY = [110,118,135];
  const LIGHT = [240,242,247];
  const SUCCESS = [38,160,110];
  const WARN = [200,130,40];

  // ============ HEADER ============
  doc.setFillColor(...DARK);
  doc.rect(0, 0, PW, 38, "F");
  doc.setFillColor(...PRIMARY);
  doc.rect(0, 38, PW, 2, "F");

  // Logo circle
  doc.setFillColor(...PRIMARY);
  doc.circle(20, 19, 8, "F");
  doc.setTextColor(255,255,255);
  doc.setFont("helvetica","bold");
  doc.setFontSize(14);
  doc.text("BH", 20, 21.5, {align:"center"});

  doc.setFontSize(18);
  doc.text("CONTROLE DE CORTE", 32, 17);
  doc.setFont("helvetica","normal");
  doc.setFontSize(9.5);
  doc.setTextColor(180,190,210);
  doc.text("Relatório financeiro de serviços de barbearia", 32, 23);

  // Right side: doc info
  const today = fmtDateBR(new Date());
  doc.setFontSize(8.5);
  doc.setTextColor(180,190,210);
  doc.text(`Emitido em: ${today}`, PW-14, 17, {align:"right"});
  doc.text(`Documento Nº ${Date.now().toString().slice(-8)}`, PW-14, 22, {align:"right"});

  // ============ TÍTULO DO PERÍODO ============
  let yy = 52;
  doc.setTextColor(...DARK);
  doc.setFont("helvetica","bold");
  doc.setFontSize(13);
  doc.text("Relatório do Período", 14, yy);
  doc.setFont("helvetica","normal");
  doc.setFontSize(11);
  doc.setTextColor(...GRAY);
  doc.text(periodo.charAt(0).toUpperCase()+periodo.slice(1), 14, yy+6);

  // Cliente / Profissional box
  yy += 14;
  doc.setDrawColor(...LIGHT);
  doc.setFillColor(250,251,253);
  doc.roundedRect(14, yy, PW-28, 18, 2, 2, "FD");
  doc.setFontSize(8.5);
  doc.setTextColor(...GRAY);
  doc.text("CLIENTE", 18, yy+5);
  doc.text("PROFISSIONAL", 80, yy+5);
  doc.text("CONTATO", 142, yy+5);
  doc.setFont("helvetica","bold");
  doc.setFontSize(10.5);
  doc.setTextColor(...DARK);
  doc.text("Matheus Bhering", 18, yy+12);
  doc.text("Hugo", 80, yy+12);
  doc.text("(31) 97132-5441", 142, yy+12);
  doc.setFont("helvetica","normal");

  // ============ CARDS DE RESUMO ============
  yy += 26;
  const cardW = (PW - 28 - 12) / 4;
  const cards = [
    {label:"CORTES", value:String(data.length), color:PRIMARY},
    {label:"TOTAL", value:fmtBRL(total), color:DARK},
    {label:"PAGO", value:fmtBRL(totalPag), color:SUCCESS},
    {label:"PENDENTE", value:fmtBRL(totalPend), color:WARN},
  ];
  cards.forEach((c,i)=>{
    const x = 14 + i*(cardW+4);
    doc.setFillColor(252,253,255);
    doc.setDrawColor(225,228,235);
    doc.roundedRect(x, yy, cardW, 22, 2, 2, "FD");
    doc.setFillColor(...c.color);
    doc.rect(x, yy, 2, 22, "F");
    doc.setFontSize(7.5);
    doc.setTextColor(...GRAY);
    doc.text(c.label, x+5, yy+6);
    doc.setFont("helvetica","bold");
    doc.setFontSize(c.value.length>10?11:13);
    doc.setTextColor(...c.color);
    doc.text(c.value, x+5, yy+15);
    doc.setFont("helvetica","normal");
  });

  // ============ TABELA ============
  yy += 32;
  doc.setFont("helvetica","bold");
  doc.setFontSize(11);
  doc.setTextColor(...DARK);
  doc.text("Detalhamento dos serviços", 14, yy);
  yy += 4;

  const cols = [
    {label:"#",      x:14,  w:10,  align:"left"},
    {label:"DATA",   x:24,  w:22,  align:"left"},
    {label:"SERVIÇO",x:46,  w:84,  align:"left"},

    {label:"PAGTO",  x:154, w:22,  align:"left"},
    {label:"STATUS", x:176, w:20,  align:"left"},
  ];
  const drawHeader = ()=>{
    doc.setFillColor(...DARK);
    doc.rect(14, yy, PW-28, 8, "F");

    doc.setFontSize(8.5);
    doc.setTextColor(255,255,255);

      const tx = c.align==="right" ? c.x+c.w-2 : c.x+2;
      doc.text(c.label, tx, yy+5.5, {align:c.align});
    });
    yy += 8;
  };
  drawHeader();

  doc.setFont("helvetica","normal");
  doc.setFontSize(9);
  data.forEach((r,i)=>{
    if(yy > PH-30){ doc.addPage(); yy = 20; drawHeader(); }
    if(i % 2 === 0){
      doc.setFillColor(248,249,252);
      doc.rect(14, yy, PW-28, 7, "F");

    doc.setTextColor(...DARK);

      String(i+1).padStart(2,"0"),
      r.data||"-",
      (r.tipo||"-").length>48 ? r.tipo.slice(0,48)+"…" : (r.tipo||"-"),
      fmtBRL(r.preco),
      r.dataPagamento||"—",
    ];
    cols.slice(0,5).forEach((c,j)=>{
      const tx = c.align==="right" ? c.x+c.w-2 : c.x+2;
      doc.text(String(row[j]), tx, yy+5, {align:c.align});
    });
    // Status pill
    const pago = r.status.toLowerCase()==="pago";
    const sx = cols[5].x+2, sy = yy+1.5, sw=18, sh=4.5;
    doc.setFillColor(...(pago?SUCCESS:WARN));
    doc.roundedRect(sx, sy, sw, sh, 1, 1, "F");
    doc.setTextColor(255,255,255);
    doc.setFontSize(7);
    doc.setFont("helvetica","bold");
    doc.text(pago?"PAGO":"PENDENTE", sx+sw/2, sy+3.2, {align:"center"});
    doc.setFont("helvetica","normal");
    doc.setFontSize(9);
    yy += 7;
  });

  if(!data.length){
    doc.setTextColor(...GRAY);
    doc.text("Nenhum corte registrado neste período.", PW/2, yy+8, {align:"center"});
    yy += 14;
  }

  // ============ TOTAIS ============
  yy += 4;
  if(yy > PH-50){ doc.addPage(); yy = 20; }
  doc.setDrawColor(...LIGHT);
  doc.line(14, yy, PW-14, yy);
  yy += 6;

  const totalsX = PW - 80;
  doc.setFontSize(10);
  doc.setTextColor(...GRAY);
  doc.text("Subtotal de serviços:", totalsX, yy);
  doc.setTextColor(...DARK);
  doc.text(fmtBRL(total), PW-14, yy, {align:"right"});
  yy += 6;
  doc.setTextColor(...GRAY);
  doc.text("Total já pago:", totalsX, yy);
  doc.setTextColor(...SUCCESS);
  doc.text(fmtBRL(totalPag), PW-14, yy, {align:"right"});
  yy += 6;
  doc.setTextColor(...GRAY);
  doc.text("Total pendente:", totalsX, yy);
  doc.setTextColor(...WARN);
  doc.text(fmtBRL(totalPend), PW-14, yy, {align:"right"});
  yy += 8;

  doc.setFillColor(...DARK);
  doc.roundedRect(totalsX-4, yy-4, PW-14-(totalsX-4), 11, 1.5, 1.5, "F");
  doc.setFont("helvetica","bold");
  doc.setFontSize(12);
  doc.setTextColor(255,255,255);
  doc.text("TOTAL GERAL", totalsX, yy+3);
  doc.text(fmtBRL(total), PW-14, yy+3, {align:"right"});

  // ============ FOOTER em todas as páginas ============
  const pageCount = doc.internal.getNumberOfPages();
  for(let p=1; p<=pageCount; p++){
    doc.setPage(p);
    doc.setDrawColor(...LIGHT);
    doc.line(14, PH-16, PW-14, PH-16);
    doc.setFont("helvetica","normal");
    doc.setFontSize(8);
    doc.setTextColor(...GRAY);
    doc.text("Documento gerado automaticamente pelo sistema CONTROLE DE CORTE.", 14, PH-10);
    doc.text(`Página ${p} de ${pageCount}`, PW/2, PH-10, {align:"center"});
    doc.text("Criado por Matheus Bhering", PW-14, PH-10, {align:"right"});
  }

  const fname = `relatorio-cortes-${(periodo.toLowerCase().replace(/\s+/g,"-"))}.pdf`;
  doc.save(fname);
}

/* ============== INIT ============== */
if(sessionStorage.getItem("logged")==="1"){ showApp(); }
</script>
