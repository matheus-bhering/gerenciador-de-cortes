<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>CONTROLE DE CORTE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        /* Old School Black Theme - Alto contraste para fácil visualização */
        @import url('https://fonts.googleapis.com/css2?family=Georgia:wght@400;700&display=swap');
        
        :root {
            --bg: #000000;
            --surface: #1a1a1a;
            --surface-2: #2a2a2a;
            --border: #444444;
            --text: #f0f0f0;
            --text-strong: #ffffff;
            --muted: #888888;
            --primary: #00aa00; /* Verde old school */
            --primary-2: #00cc00;
            --success: #00aa00;
            --warning: #cc8800;
            --danger: #cc0000;
            --whatsapp: #25d366;
            --radius: 8px;
            --shadow: 4px 4px 12px rgba(0,0,0,0.8), inset -2px -2px 4px rgba(255,255,255,0.05);
            --shadow-inset: inset 2px 2px 4px rgba(255,255,255,0.1);
            --font-old: Georgia, 'Times New Roman', Times, serif;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            margin: 0;
            padding: 0;
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-old);
            font-size: 16px;
            line-height: 1.5;
        }

        a {
            color: var(--primary);
            text-decoration: none;
            font-weight: bold;
        }

        button, input, select, textarea {
            font-family: inherit;
            font-size: 16px;
            color: var(--text-strong);
        }

        input, select, textarea {
            width: 100%;
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 16px;
            outline: none;
            font-weight: 500;
            transition: all 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            box-shadow: var(--shadow);
            background: var(--surface);
        }

        label {
            display: block;
            font-size: 14px;
            color: var(--text);
            margin: 12px 0 6px;
            font-weight: 700;
        }

        /* Botões old school com bevel */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: linear-gradient(145deg, var(--primary), var(--primary-2));
            color: #000;
            border: none;
            border-radius: var(--radius);
            padding: 14px 20px;
            font-weight: 700;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            position: relative;
            box-shadow: var(--shadow), var(--shadow-inset);
            transition: all 0.15s;
        }

        .btn:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 6px rgba(0,0,0,0.8), inset 2px 2px 4px rgba(0,0,0,0.2);
        }

        .btn:hover {
            box-shadow: 6px 6px 16px rgba(0,0,0,0.9), var(--shadow-inset);
        }

        .btn.secondary {
            background: linear-gradient(145deg, var(--surface-2), var(--surface));
            color: var(--text-strong);
            box-shadow: var(--shadow), var(--shadow-inset);
        }

        .btn.success { background: linear-gradient(145deg, var(--success), #00cc00); color: #000; }
        .btn.warning { background: linear-gradient(145deg, var(--warning), #ffaa00); color: #000; }
        .btn.danger { background: linear-gradient(145deg, var(--danger), #ff4444); color: #fff; }
        .btn.whatsapp { background: linear-gradient(145deg, var(--whatsapp), #00ff88); color: #000; }

        .btn.sm {
            padding: 10px 14px;
            font-size: 14px;
            border-radius: 6px;
            width: auto;
        }

        .row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .row > * { flex: 1; }

        /* Login */
        #login {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .login-card {
            background: var(--surface);
            border: 3px solid var(--border);
            border-radius: 12px;
            padding: 32px;
            width: 100%;
            max-width: 420px;
            box-shadow: var(--shadow);
            text-align: center;
            position: relative;
        }

        .logo {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--primary-2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 16px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            box-shadow: var(--shadow);
        }

        .login-card h1 {
            margin: 0 0 8px;
            font-size: 24px;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .login-card p {
            margin: 0 0 24px;
            color: var(--muted);
            font-size: 14px;
        }

        /* App */
        #app {
            display: none;
            padding-bottom: 100px;
            min-height: 100vh;
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(0,0,0,0.95);
            backdrop-filter: blur(12px);
            border-bottom: 3px solid var(--border);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--shadow);
        }

        header .title {
            font-weight: 700;
            font-size: 18px;
            letter-spacing: 1px;
            flex: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        header .icon-btn {
            background: var(--surface-2);
            border: 2px solid var(--border);
            color: var(--text);
            width: 44px;
            height: 44px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        header .icon-btn:hover {
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(0,170,0,0.5);
        }

        header .icon-btn:active {
            transform: scale(0.95);
        }

        main {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .section {
            background: var(--surface);
            border: 3px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .section h2 {
            margin: 0 0 16px;
            font-size: 16px;
            color: var(--text-strong);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .section h2::before {
            content: '';
            display: inline-block;
            width: 6px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary), var(--primary-2));
            border-radius: 3px;
            box-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        /* Filtros */
        .filter-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 12px;
        }

        .filter-grid label {
            margin: 0 0 6px;
        }

        .filter-grid select {
            padding: 12px 16px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Stats Dashboard */
        .stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .stat {
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            text-align: center;
            box-shadow: var(--shadow);
        }

        .stat.full {
            grid-column: 1 / -1;
        }

        .stat .label {
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .stat .value {
            font-size: 28px;
            font-weight: 700;
            margin-top: 4px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .stat.primary .value { color: var(--primary); }
        .stat.success .value { color: var(--success); }
        .stat.warning .value { color: var(--warning); }

        /* Quick actions */
        .quick {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .quick .full {
            grid-column: 1 / -1;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 6px;
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 6px;
            margin-bottom: 16px;
            box-shadow: var(--shadow);
        }

        .tabs button {
            flex: 1;
            background: transparent;
            border: 2px solid transparent;
            color: var(--muted);
            padding: 12px;
            border-radius: 6px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }

        .tabs button.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
            box-shadow: var(--shadow);
        }

        /* Corte cards */
        .corte {
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 16px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .corte-head {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }

        .corte .tipo {
            font-weight: 700;
            font-size: 16px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        .corte .data {
            font-size: 13px;
            color: var(--muted);
            margin-top: 4px;
        }

        .corte .preco {
            font-weight: 700;
            font-size: 20px;
            white-space: nowrap;
            color: var(--primary);
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }

        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            box-shadow: var(--shadow);
        }

        .badge.pago {
            background: rgba(0,170,0,0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .badge.pendente {
            background: rgba(204,136,0,0.2);
            color: var(--warning);
            border: 1px solid var(--warning);
        }

        .corte .obs {
            font-size: 14px;
            color: var(--text);
            margin-top: 8px;
            white-space: pre-wrap;
            word-break: break-word;
            padding: 12px;
            background: rgba(255,255,255,0.03);
            border-left: 4px solid var(--primary);
        }

        .corte .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 12px;
        }

        .corte .actions .full {
            grid-column: 1 / -1;
        }

        /* Thumbs */
        .receipt-thumbs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 12px;
            margin-top: 12px;
        }

        .receipt-thumb {
            position: relative;
            aspect-ratio: 1;
            background: var(--surface-2);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: var(--shadow);
        }

        .receipt-thumb:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
            box-shadow: 0 8px 20px rgba(0,170,0,0.3);
        }

        .receipt-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .receipt-thumb .ph {
            font-size: 32px;
            color: var(--muted);
        }

        .receipt-thumb .num {
            position: absolute;
            top: 8px;
            left: 8px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 20px;
            font-weight: 700;
        }

        /* Lightbox */
        #lightbox {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 500;
            padding: 20px;
            flex-direction: column;
            backdrop-filter: blur(8px);
        }

        #lightbox.show {
            display: flex;
        }

        #lightbox img {
            max-width: 95%;
            max-height: 85vh;
            border-radius: var(--radius);
            box-shadow: 0 20px 60px rgba(0,0,0,1);
            border: 3px solid var(--border);
        }

        #lightbox .lb-bar {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }

        #lightbox .lb-bar button, #lightbox .lb-bar a {
            background: var(--surface);
            border: 2px solid var(--border);
            color: var(--text-strong);
            padding: 12px 20px;
            border-radius: var(--radius);
            font-weight: 700;
            cursor: pointer;
            text-decoration: none;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: var(--shadow);
            transition: all 0.2s;
        }

        #lightbox .lb-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.15);
            border: none;
            color: #fff;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            box-shadow: var(--shadow);
        }

        /* Modal */
        .modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 200;
            padding: 0;
            backdrop-filter: blur(12px);
        }

        .modal-bg.show {
            display: flex;
        }

        .modal {
            background: var(--surface);
            width: 100%;
            max-width: 560px;
            border-radius: 12px 12px 0 0;
            padding: 24px;
            max-height: 90vh;
            overflow-y: auto;
            border: 3px solid var(--border);
            border-bottom: none;
            box-shadow: var(--shadow);
        }

        .modal h3 {
            margin: 0 0 16px;
            font-size: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .modal .close {
            float: right;
            background: transparent;
            border: none;
            color: var(--muted);
            font-size: 24px;
            cursor: pointer;
            line-height: 1;
            margin-top: -8px;
        }

        /* Toast */
        #toast {
            position: fixed;
            left: 50%;
            bottom: 100px;
            transform: translateX(-50%);
            background: #2a2a2a;
            color: #fff;
            border: 2px solid var(--border);
            padding: 14px 20px;
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s;
            z-index: 300;
            font-size: 15px;
            max-width: 90vw;
            text-align: center;
            font-weight: 500;
        }

        #toast.show {
            opacity: 1;
            bottom: 120px;
        }

        #toast.error {
            border-color: var(--danger);
            background: rgba(204,0,0,0.9);
        }

        #toast.success {
            border-color: var(--success);
            background: rgba(0,170,0,0.9);
        }

        /* Loader */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            display: inline-block;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #fullLoader {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 400;
            backdrop-filter: blur(6px);
        }

        #fullLoader.show {
            display: flex;
        }

        #fullLoader .spinner {
            width: 48px;
            height: 48px;
            border-width: 4px;
            border-top-color: var(--primary);
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 24px 20px;
            color: var(--muted);
            font-size: 13px;
            border-top: 3px solid var(--border);
            background: var(--bg);
            margin-top: 40px;
        }

        /* Empty */
        .empsize: 13px;
            border-top: 3px solid var(--bordvar(--muted);
            padding: 32px;
            font-size: 16px;
            font-style: italic;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-thusize: 13px;
            border-top: 3px solid var(--bordborder-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }
    </style>
</head>
